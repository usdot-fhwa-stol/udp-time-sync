name: Build Workflow

on:
  workflow_dispatch:
  push:
   branches:
     - master
     - develop
     - 'release/*'
     - 'feature*'
     - 'tt-138-create-time-sync-library'
   tags:
     - 'carma-system-*'
jobs:
  build-package:
    strategy:
      matrix:
        include:
          # - architecture: x64
          #   ubuntu: focal
          #   build: true
          - architecture: x64
            ubuntu: jammy
            build: true
    uses: usdot-fhwa-stol/actions/.github/workflows/cpp-module-build.yml@main
    with:
      component-name: ${{ matrix.ubuntu }}
      build: ${{ matrix.build }}
      build-architecture: ${{ matrix.architecture }}
      build-image-tag: ${{ matrix.ubuntu }}
    secrets:
      aws-access-key-id: ${{ secrets.APT_REPO_AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.APT_REPO_AWS_SECRET_ACCESS_KEY }}
